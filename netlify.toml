[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NEXT_PUBLIC_APP_URL = "https://globalgamminghub.netlify.app"

[context.preview.environment]
  NEXT_PUBLIC_APP_URL = "https://deploy-preview-*.globalgamminghub.netlify.app"

[context.branch-deploy.environment]
  NEXT_PUBLIC_APP_URL = "https://*.globalgamminghub.netlify.app"
